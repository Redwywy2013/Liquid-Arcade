<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Arcade</title>
<style>
*{box-sizing:border-box}
:root{
  --bg0:#020617;
  --bg1:#07111f;
  --bg2:#143454;
  --panel:rgba(15,23,42,.78);
  --border:rgba(148,163,184,.25);
  --muted:#94a3b8;
  --text:#e5f0ff;
  --cyan:#38bdf8;
  --green:#22c55e;
  --purple:#a78bfa;
  --orange:#f97316;
  --red:#ef4444;
  --yellow:#facc15;
  --pink:#ec4899;
}
body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  color:var(--text);
  font-family:system-ui,sans-serif;
  background:
    radial-gradient(circle at 50% 0%,rgba(56,189,248,.18),transparent 26%),
    radial-gradient(circle at 15% 25%,rgba(34,197,94,.12),transparent 24%),
    radial-gradient(circle at 85% 35%,rgba(167,139,250,.12),transparent 26%),
    radial-gradient(circle at 20% 20%,#143454,#07111f 45%,#020617);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(255,255,255,.026) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(circle at center,black,transparent 80%);
}
.app{
  position:relative;
  z-index:1;
  width:min(1540px,calc(100vw - 26px));
  height:calc(100dvh - 26px);
  min-height:650px;
  margin:13px auto;
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
  gap:12px;
  padding:14px;
  border:1px solid rgba(148,163,184,.28);
  border-radius:28px;
  background:rgba(2,6,23,.48);
  box-shadow:0 24px 90px rgba(0,0,0,.52),inset 0 0 90px rgba(56,189,248,.04);
  backdrop-filter:blur(14px);
  overflow:hidden;
}
.hero{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  min-height:56px;
  flex:0 0 auto;
}
.logo-mark{
  width:52px;
  height:34px;
  filter:drop-shadow(0 0 18px rgba(56,189,248,.75));
}
h1{
  margin:0;
  font-size:clamp(28px,3vw,42px);
  letter-spacing:-.06em;
  line-height:1;
}
.kicker,.subtitle{display:none}
.category-shell{
  position:relative;
  padding:0 18px;
  border-bottom:1px solid rgba(59,130,246,.45);
  flex:0 0 auto;
}
.category-tabs{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:0;
  align-items:end;
  overflow:hidden;
}
.category-tab{
  position:relative;
  height:70px;
  padding:0 16px;
  border:1px solid rgba(148,163,184,.18);
  border-bottom:none;
  border-radius:22px 22px 0 0;
  background:linear-gradient(180deg,rgba(15,23,42,.72),rgba(2,6,23,.76));
  color:var(--muted);
  font-size:15px;
  font-weight:950;
  letter-spacing:.01em;
  cursor:pointer;
  transform:translateY(12px) skewX(-12deg);
  transition:all .22s ease;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
}
.category-tab span{
  display:inline-flex;
  gap:9px;
  align-items:center;
  transform:skewX(12deg);
}
.category-tab:hover{
  color:var(--text);
  background:linear-gradient(180deg,rgba(30,41,59,.9),rgba(2,6,23,.82));
}
.category-tab.active{
  z-index:2;
  color:var(--text);
  border-color:rgba(59,130,246,.72);
  background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.95));
  box-shadow:0 -4px 24px rgba(59,130,246,.24),inset 0 1px 0 rgba(255,255,255,.08);
  transform:translateY(2px) skewX(-12deg);
}
.category-tab.active::after{
  content:"";
  position:absolute;
  left:20px;
  right:20px;
  bottom:0;
  height:3px;
  border-radius:999px;
  background:linear-gradient(90deg,#38bdf8,#3b82f6);
  box-shadow:0 0 18px rgba(56,189,248,.85);
}
.content-shell{
  display:grid;
  grid-template-columns:330px minmax(0,1fr);
  gap:18px;
  min-height:0;
  height:100%;
  padding:14px;
  border:1px solid rgba(59,130,246,.34);
  border-radius:24px;
  background:rgba(2,6,23,.36);
  box-shadow:inset 0 0 70px rgba(56,189,248,.035);
  overflow:hidden;
}
.drawer{min-height:0;overflow:hidden}
.panel{
  min-height:0;
  height:100%;
  background:linear-gradient(180deg,rgba(15,23,42,.72),rgba(2,6,23,.64));
  border:1px solid rgba(148,163,184,.20);
  border-radius:24px;
  padding:18px;
  box-shadow:0 20px 70px rgba(0,0,0,.35),inset 0 0 60px rgba(56,189,248,.04);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  scrollbar-width:thin;
}
.panel-art{
  height:135px;
  flex:0 0 135px;
  border-radius:22px;
  display:grid;
  place-items:center;
  margin-bottom:14px;
  background:radial-gradient(circle at 50% 50%,color-mix(in srgb,var(--selected-glow),transparent 52%),transparent 42%);
}
.panel-art svg{
  width:100px;
  height:100px;
  filter:drop-shadow(0 0 24px var(--selected-glow));
}
.panel h2{
  margin:0 0 10px;
  font-size:28px;
  letter-spacing:-.055em;
}
.panel p{
  margin:0;
  color:#cbd5e1;
  line-height:1.45;
  font-size:14px;
}
.facts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin:14px 0;
}
.box{
  background:rgba(2,6,23,.45);
  border:1px solid rgba(148,163,184,.16);
  border-radius:14px;
  padding:10px;
}
.box span{
  display:block;
  color:var(--muted);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.box b{
  display:block;
  margin-top:3px;
  font-size:14px;
}
.feature-list{
  display:grid;
  gap:8px;
  margin:0 0 14px;
  overflow:visible;
}
.feature{
  display:flex;
  gap:9px;
  align-items:flex-start;
  background:rgba(2,6,23,.34);
  border:1px solid rgba(148,163,184,.13);
  border-radius:13px;
  padding:9px;
}
.feature-dot{
  width:8px;
  height:8px;
  flex:0 0 8px;
  margin-top:5px;
  border-radius:999px;
  background:var(--selected-glow);
  box-shadow:0 0 16px var(--selected-glow);
}
.feature b{display:block;font-size:13px;margin-bottom:1px}
.feature span{display:block;color:#94a3b8;font-size:12px;line-height:1.3}
.sidebar-footer{
  margin-top:auto;
  display:grid;
  gap:10px;
}
.play{
  width:100%;
  padding:14px 18px;
  border:1px solid rgba(59,130,246,.8);
  border-radius:16px;
  color:white;
  font-weight:950;
  font-size:16px;
  letter-spacing:.03em;
  cursor:pointer;
  text-decoration:none;
  text-align:center;
  background:linear-gradient(135deg,rgba(37,99,235,.96),rgba(29,78,216,.68));
  box-shadow:0 0 32px rgba(59,130,246,.28),inset 0 1px 0 rgba(255,255,255,.16);
}
.play:hover{filter:brightness(1.15)}
.tab-panel{
  min-height:0;
  height:100%;
  overflow:hidden;
}
.grid{
  height:100%;
  max-height:100%;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
  align-content:start;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  padding-right:8px;
  padding-bottom:12px;
}
.card{
  position:relative;
  min-height:185px;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(15,23,42,.70),rgba(2,6,23,.62));
  border:1px solid rgba(148,163,184,.18);
  border-radius:20px;
  padding:16px;
  box-shadow:0 16px 48px rgba(0,0,0,.35),inset 0 0 50px rgba(56,189,248,.04);
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
}
.card:hover,.card.active{
  transform:translateY(-3px);
  border-color:var(--glow);
  box-shadow:0 18px 54px rgba(0,0,0,.46),0 0 36px color-mix(in srgb,var(--glow),transparent 68%);
}
.card:before{
  content:"";
  position:absolute;
  left:50%;
  top:52px;
  width:68px;
  height:68px;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:radial-gradient(circle,color-mix(in srgb,var(--glow),transparent 48%) 0%,transparent 74%);
  opacity:.75;
  pointer-events:none;
  filter:blur(8px);
}
.icon{
  position:relative;
  z-index:1;
  width:54px;
  height:54px;
  border-radius:22px;
  display:grid;
  place-items:center;
  margin:0 auto 10px;
  background:rgba(2,6,23,.34);
  box-shadow:
    0 0 30px color-mix(in srgb,var(--glow),transparent 68%),
    inset 0 0 20px rgba(255,255,255,.03);
}
.icon svg{
  width:40px;
  height:40px;
  filter:drop-shadow(0 0 16px var(--glow));
}
.card h2{
  position:relative;
  margin:0 0 6px;
  font-size:20px;
  letter-spacing:-.045em;
}
.card p{
  position:relative;
  margin:0 0 10px;
  color:#cbd5e1;
  font-size:12px;
  line-height:1.32;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.tag{
  position:absolute;
  top:14px;
  right:14px;
  color:var(--glow);
  border:1px solid color-mix(in srgb,var(--glow),transparent 50%);
  background:color-mix(in srgb,var(--glow),transparent 88%);
  border-radius:999px;
  padding:3px 9px;
  font-size:10px;
  font-weight:900;
}

@media(max-width:1250px){
  .content-shell{grid-template-columns:280px minmax(0,1fr)}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .category-tab{font-size:13px;padding:0 10px}
}
@media(max-width:900px){
  body{overflow:auto}
  .app{height:auto;min-height:100dvh;width:100%;margin:0;border-radius:0;overflow:visible}
  .category-tabs{grid-template-columns:repeat(3,1fr);gap:6px;overflow:visible}
  .category-tab{height:52px;transform:none;border-radius:16px}
  .category-tab span{transform:none}
  .category-tab.active{transform:none}
  .content-shell{grid-template-columns:1fr;overflow:visible;height:auto}
  .drawer{overflow:visible}
  .panel{min-height:420px;max-height:none;height:auto;overflow:visible}
  .grid{grid-template-columns:1fr;overflow:visible;height:auto;max-height:none}
}
</style>
</head>
<body>
<div class="app">
  <section class="hero">
    <svg class="logo-mark" viewBox="0 0 100 64" fill="none"><path d="M8 32h22l9-20 18 42 12-30h23" stroke="#38bdf8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="32" r="7" fill="#22c55e"/><circle cx="92" cy="24" r="7" fill="#22c55e"/></svg>
    <h1>Liquid Arcade</h1>
  </section>

  <div class="category-shell">
    <nav class="category-tabs" id="categoryTabs" aria-label="Project categories"></nav>
  </div>

  <section class="content-shell">
    <aside class="drawer">
      <section class="panel">
        <div class="panel-art" id="panelArt"></div>
        <h2 id="panelTitle">Liquid Electrons</h2>
        <p id="panelDesc">A slick circuit sandbox where batteries, resistors, LEDs, buzzers, motors, switches, and other parts can be dragged into a glowing workspace and tested like a tiny digital electronics bench.</p>
        <div class="facts">
          <div class="box"><span>Type</span><b id="panelType">Sandbox</b></div>
          <div class="box"><span>Status</span><b>Ready</b></div>
        </div>
        <div class="feature-list" id="featureList"></div>
        <div class="sidebar-footer">
          <div class="box"><span>Launch</span><b id="launchPhrase">Complete the circuit.</b></div>
          <a class="play" id="playBtn" href="/liquids/electrons/">▶ Launch Game</a>
        </div>
      </section>
    </aside>

    <div class="tab-panel">
      <section class="grid" id="grid"></section>
    </div>
  </section>
</div>

<script>
const games=[
  {
    id:"electrons",
    title:"Liquid Electrons",
    route:"/liquids/electrons/",
    type:"Sandbox",
    tag:"Sim",
    categories:["All","Simulations","Sandboxes"],
    color:"#38bdf8",
    desc:"A slick circuit sandbox where batteries, resistors, LEDs, buzzers, motors, switches, and other parts can be dragged into a glowing workspace and tested like a tiny digital electronics bench.",
    launch:"Complete the circuit.",
    features:[
      ["Build", "Drag batteries, lights, switches, motors, and modules onto the board."],
      ["Wire", "Connect terminals and test closed circuits with live current flow."],
      ["Tweak", "Edit component values, colors, audio, speed, and simulation behavior."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><path d="M18 52h18l8-22 14 44 9-24h15" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="52" r="7" fill="#22c55e"/><circle cx="82" cy="50" r="7" fill="#22c55e"/></svg>`
  },
  {
    id:"snake",
    title:"Liquid Snake",
    route:"/liquids/snake/",
    type:"Arcade Sandbox",
    tag:"Game",
    categories:["All","Games","Arcade"],
    color:"#22c55e",
    desc:"A polished snake game with smooth movement, adjustable board sizes, keybinds, food settings, color controls, score tracking, and enough glow to make the old Nokia snake jealous.",
    launch:"Consume the glowing circles.",
    features:[
      ["Customize", "Change board size, snake speed, colors, and food count."],
      ["Control", "Use arrow keys or WASD, with editable keybinds."],
      ["Compete", "Track score and best score with smooth arcade movement."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><path d="M22 70c20 0 16-36 38-36h12c10 0 10 16 0 16H56c-20 0-16 34-38 34" stroke="#22c55e" stroke-width="12" stroke-linecap="round"/><circle cx="73" cy="40" r="3" fill="#e5f0ff"/><circle cx="22" cy="70" r="7" fill="#facc15"/></svg>`
  },
  {
    id:"universe",
    title:"Liquid Universe",
    route:"/liquids/universe/",
    type:"Physics Sandbox",
    tag:"Sandbox",
    categories:["All","Simulations","Sandboxes"],
    color:"#a78bfa",
    desc:"A gravity sandbox for building solar systems, tossing bodies into orbit, merging objects, making black holes, tuning physics, and watching space do space crimes.",
    launch:"Bend space responsibly.",
    features:[
      ["Spawn", "Create planets, stars, gas bodies, and black holes."],
      ["Simulate", "Tune gravity, collisions, trails, physics steps, and time scale."],
      ["Observe", "Watch orbits, mergers, barycenters, force lines, and chaos unfold."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="10" fill="#a78bfa"/><ellipse cx="50" cy="50" rx="38" ry="16" stroke="#38bdf8" stroke-width="5"/><ellipse cx="50" cy="50" rx="18" ry="38" stroke="#22c55e" stroke-width="5" transform="rotate(35 50 50)"/><circle cx="80" cy="50" r="5" fill="#facc15"/></svg>`
  },
  {
    id:"calc",
    title:"Liquid Calc",
    route:"/liquids/calc/",
    type:"Tool Sandbox",
    tag:"Tool",
    categories:["All","Tools","Sandboxes"],
    color:"#f97316",
    desc:"A glowing scientific calculator with variables, custom functions, memory, history, base modes, and power tools for heavier math work.",
    launch:"Crunch the chaos.",
    features:[
      ["Calculate", "Use scientific functions, trig, logs, roots, powers, and comparisons."],
      ["Store", "Save variables, custom functions, memory values, and recent results."],
      ["Explore", "Run summations, products, derivatives, integrals, root solving, and tables."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><rect x="24" y="14" width="52" height="72" rx="14" fill="rgba(249,115,22,.2)" stroke="#f97316" stroke-width="6"/><rect x="34" y="25" width="32" height="13" rx="4" fill="#ef4444"/><circle cx="38" cy="53" r="4" fill="#f97316"/><circle cx="50" cy="53" r="4" fill="#f97316"/><circle cx="62" cy="53" r="4" fill="#f97316"/><circle cx="38" cy="66" r="4" fill="#ef4444"/><circle cx="50" cy="66" r="4" fill="#ef4444"/><path d="M60 65h9" stroke="#e5f0ff" stroke-width="5" stroke-linecap="round"/></svg>`
    },
  {
    id:"2048",
    title:"Liquid 2048",
    route:"/liquids/2048/",
    type:"Puzzle Sandbox",
    tag:"Puzzle",
    categories:["All","Games","Puzzles"],
    color:"#facc15",
    desc:"A glowing version of 2048 where numbered tiles slide, merge, and escalate into increasingly chaotic powers of two.",
    launch:"Merge toward infinity.",
    features:[
      ["Slide", "Move every tile at once using directional swipes or arrow keys."],
      ["Merge", "Combine matching values into larger powers of two."],
      ["Survive", "Manage space carefully before the board completely fills up."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><rect x="18" y="18" width="28" height="28" rx="8" fill="#facc15"/><rect x="54" y="18" width="28" height="28" rx="8" fill="#fde68a"/><rect x="18" y="54" width="28" height="28" rx="8" fill="#f59e0b"/><rect x="54" y="54" width="28" height="28" rx="8" fill="#f97316"/><path d="M32 32h36v36" stroke="#fff7ed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  },
  {
    id:"minesweeper",
    title:"Liquid Minesweeper",
    route:"/liquids/minesweeper/",
    type:"Puzzle Sandbox",
    tag:"Puzzle",
    categories:["All","Games","Puzzles"],
    color:"#ef4444",
    desc:"A glowing Minesweeper puzzle with hidden mines, number clues, flags, and careful clicks that can either clear the board or unleash instant chaos.",
    launch:"Defuse the grid.",
    features:[
      ["Reveal", "Click tiles to uncover safe spaces and clue numbers."],
      ["Flag", "Mark suspected mines before they ruin your whole afternoon."],
      ["Solve", "Use logic, pattern reading, and bravery to clear the field."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><rect x="16" y="16" width="68" height="68" rx="14" fill="rgba(239,68,68,.18)" stroke="#ef4444" stroke-width="6"/><path d="M33 33h34M33 50h34M33 67h34M33 33v34M50 33v34M67 33v34" stroke="#fecaca" stroke-width="3" opacity=".8"/><circle cx="50" cy="50" r="10" fill="#ef4444"/><path d="M50 32v-9M50 77v-9M32 50h-9M77 50h-9M37 37l-7-7M70 70l-7-7M63 37l7-7M30 70l7-7" stroke="#f97316" stroke-width="5" stroke-linecap="round"/></svg>`
  },
  {
    id:"tetris",
    title:"Liquid Tetris",
    route:"/liquids/tetris/",
    type:"Arcade Sandbox",
    tag:"Game",
    categories:["All","Games"],
    color:"#ec4899",
    desc:"A pink neon version of Tetris with glowing falling blocks, fast rotations, stacked combos, and arcade-style visual effects.",
    launch:"Stack beyond reason.",
    features:[
      ["Rotate", "Spin and position falling tetrominoes with fast responsive controls."],
      ["Clear", "Complete rows to clear lines and keep the stack under control."],
      ["Survive", "Manage speed increases and chaotic stacks as the game accelerates."]
    ],
    icon:`<svg viewBox="0 0 100 100" fill="none"><rect x="20" y="20" width="18" height="18" rx="4" fill="#ec4899"/><rect x="40" y="20" width="18" height="18" rx="4" fill="#f472b6"/><rect x="60" y="20" width="18" height="18" rx="4" fill="#ec4899"/><rect x="40" y="40" width="18" height="18" rx="4" fill="#db2777"/><rect x="40" y="60" width="18" height="18" rx="4" fill="#f9a8d4"/></svg>`
  }
];

const grid=document.getElementById("grid");
const categoryTabs=document.getElementById("categoryTabs");
const categories=[
  {name:"All",icon:"◈"},
  {name:"Games",icon:"🎮"},
  {name:"Simulations",icon:"⚙"},
  {name:"Puzzles",icon:"🧩"},
  {name:"Tools",icon:"🛠"},
  {name:"Sandboxes",icon:"🌌"}
];

const tabGroups={
  "All":["Games","Simulations","Puzzles","Tools","Sandboxes"]
};
let activeCategory="All";
const panelArt=document.getElementById("panelArt");
const panelTitle=document.getElementById("panelTitle");
const panelDesc=document.getElementById("panelDesc");
const panelType=document.getElementById("panelType");
const playBtn=document.getElementById("playBtn");
const launchPhrase=document.getElementById("launchPhrase");
const featureList=document.getElementById("featureList");

function renderCard(game){
  const card=document.createElement("article");
  card.className="card";
  card.style.setProperty("--glow",game.color);
  card.innerHTML=`
    <div class="tag">${game.tag}</div>
    <div class="icon">${game.icon}</div>
    <h2>${game.title}</h2>
    <p>${game.desc}</p>
  `;

  card.addEventListener("click",()=>selectGame(game,card));
  grid.appendChild(card);
}

function renderCategoryTabs(){
  categoryTabs.innerHTML="";
  categories.forEach(category=>{
    const tab=document.createElement("button");
    tab.className="category-tab";
    tab.type="button";
    tab.innerHTML=`<span>${category.icon} ${category.name}</span>`;
    tab.classList.toggle("active",category.name===activeCategory);
    tab.addEventListener("click",()=>{
      activeCategory=category.name;
      renderCategoryTabs();
      renderGrid();
    });
    categoryTabs.appendChild(tab);
  });
}

function renderGrid(){
  grid.innerHTML="";
  const shown=games.filter(game=>game.categories.includes(activeCategory));
  grid.classList.toggle("compact",shown.length>4);
  grid.classList.toggle("scrollable",shown.length>8);
  shown.forEach(renderCard);
  selectGame(shown[0]||games[0],document.querySelector('.card'));
}

function selectGame(game,card){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  card.classList.add("active");

  document.documentElement.style.setProperty("--selected-glow",game.color);
  panelArt.innerHTML=game.icon;
  panelTitle.textContent=game.title;
  panelDesc.textContent=game.desc;
  panelType.textContent=game.type;
  featureList.innerHTML=game.features.map(([title,text])=>`
    <div class="feature">
      <div class="feature-dot"></div>
      <div><b>${title}</b><span>${text}</span></div>
    </div>
  `).join("");
  launchPhrase.textContent=game.launch;
  playBtn.href=game.route;
}

renderCategoryTabs();
renderGrid();
</script>
</body>
</html>
